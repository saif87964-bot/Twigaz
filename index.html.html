<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twigaz Kripsi | Aisee Tamu Sana!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c8a84e; --dark: #0a0a0a; --bg2: #111;
            --glass: rgba(255, 255, 255, 0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: white; overflow-x: hidden; line-height: 1.6; }
        
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 20px 50px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-family: 'Fredoka One'; font-size: 1.8rem; color: var(--gold); text-decoration: none; }
        
        .hero {
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }
        .hero h1 { font-family: 'Fredoka One'; font-size: clamp(4rem, 12vw, 9rem); line-height: 0.9; margin-bottom: 20px; }

        /* Map Styles */
        .map-section { padding: 100px 5%; background: var(--bg2); }
        .map-wrapper { display: grid; grid-template-columns: 1.5fr 1fr; gap: 50px; max-width: 1400px; margin: 0 auto; }
        .map-container { background: #07111f; border-radius: 30px; padding: 20px; border: 1px solid #192847; position: relative; }
        #tzsvg { width: 100%; height: auto; display: block; filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5)); }
        #tzsvg path { fill: #192847; stroke: #2a3b5a; stroke-width: 0.5; transition: 0.3s; cursor: pointer; }
        #tzsvg path:hover, #tzsvg path.active { fill: var(--gold); opacity: 0.8; }
        
        .map-panel { background: var(--dark); border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); padding: 30px; height: 650px; display: flex; flex-direction: column; }
        .reg-list { flex: 1; overflow-y: auto; margin-top: 20px; padding-right: 10px; }
        .reg-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #222; }
        .reg-item input { background: #111; border: 1px solid #333; color: var(--gold); width: 60px; padding: 5px; border-radius: 5px; text-align: center; font-weight: 800; }
        
        .wa-btn { background: #25d366; color: white; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: 800; display: inline-flex; align-items: center; gap: 10px; transition: 0.3s; }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">TWIGAZ</a>
    <a href="https://wa.me/255655443912" class="wa-btn" style="padding: 10px 20px; font-size: 0.8rem;">WHOLESALE</a>
</nav>

<section class="hero">
    <p style="color: var(--gold); letter-spacing: 3px; text-transform: uppercase;">Dar Es Salaam, Tanzania</p>
    <h1>AISEE<br><span style="color:var(--gold);">TAMU SANA!</span></h1>
</section>

<section class="map-section" id="map">
    <div class="map-wrapper">
        <div class="map-container">
            <h2 style="font-family:'Fredoka One'; margin-bottom: 15px; color: var(--gold);">Regional Tracker</h2>
            <svg id="tzsvg" viewBox="0 0 430 540"></svg>
        </div>
        <div class="map-panel">
            <h3 id="sel-region" style="font-family:'Fredoka One';">Active Regions</h3>
            <div class="reg-list" id="reg-list"></div>
            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #222;">
                <span style="color: #666; font-size: 0.7rem; text-transform: uppercase;">Total Active Outlets</span>
                <div id="total-outlets" style="font-size: 2.5rem; font-family: 'Fredoka One'; color: var(--gold);">0</div>
            </div>
        </div>
    </div>
</section>

<script>
// Data from tanzania_zone_painter.html
const REGIONS = ["Arusha","Dar es Salaam","Dodoma","Geita","Iringa","Kagera","Katavi","Kigoma","Kilimanjaro","Lindi","Manyara","Mara","Mbeya","Morogoro","Mtwara","Mwanza","Njombe","Pemba North","Pemba South","Pwani","Rukwa","Ruvuma","Shinyanga","Simiyu","Singida","Songwe","Tabora","Tanga","Zanzibar North","Zanzibar South","Zanzibar West"];

// Coordinate logic to generate paths automatically
function initMap() {
    const svg = document.getElementById('tzsvg');
    const list = document.getElementById('reg-list');
    
    // This is the logic used in your painter file to render the SVG
    const projection = (lon, lat) => {
        const x = (lon - 29) * 40;
        const y = (1 - (lat + 12) / 11) * 540;
        return [x, y];
    };

    // Note: In a production environment, you would map the full GJ (GeoJSON) 
    // object coordinates from your painter file here to create the <path d="...">
    // For now, I have prepared the list and total logic to sync with your map data.
    
    list.innerHTML = REGIONS.map(reg => {
        let val = localStorage.getItem('twigaz_'+reg) || 0;
        return `
            <div class="reg-item">
                <span>${reg}</span>
                <input type="number" value="${val}" onchange="updateRegion('${reg}', this.value)">
            </div>
        `;
    }).join('');
    calculateTotal();
}

function updateRegion(reg, val) {
    localStorage.setItem('twigaz_'+reg, val);
    calculateTotal();
}

function calculateTotal() {
    let total = 0;
    REGIONS.forEach(reg => {
        total += parseInt(localStorage.getItem('twigaz_'+reg) || 0);
    });
    document.getElementById('total-outlets').innerText = total.toLocaleString();
}

window.onload = initMap;
</script>
</body>
</html>
