<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twigaz Kripsi | Premium Tanzanian Snacks</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#070707;--card:#111111;--gold:#c8a84e;--gold-glow:rgba(200,168,78,0.3);--w:#ffffff;--t:#a0a0a0;--border:rgba(255,255,255,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--w);line-height:1.6;overflow-x:hidden}

/* Navigation */
nav{position:fixed;top:0;width:100%;z-index:1000;padding:20px 40px;display:flex;justify-content:space-between;align-items:center;background:rgba(7,7,7,0.7);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.logo{font-family:'Fredoka One',cursive;font-size:1.8rem;color:var(--gold);text-decoration:none;letter-spacing:1px}
.nav-links{display:flex;gap:30px;list-style:none}
.nav-links a{color:var(--t);text-decoration:none;font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:2px;transition:0.3s}
.nav-links a:hover{color:var(--gold)}

/* Hero Section - Vercel Inspired */
.hero{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:radial-gradient(circle at center, #1a1a1a 0%, #070707 100%)}
.hero h1{font-family:'Fredoka One',cursive;font-size:clamp(4rem, 15vw, 10rem);line-height:0.9;margin-bottom:20px;background:linear-gradient(to bottom, #fff, #444);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:1.2rem;color:var(--t);max-width:600px;letter-spacing:1px}

/* Product Section */
.sec{padding:100px 40px;max-width:1400px;margin:0 auto}
.sec-title{font-family:'Fredoka One',cursive;font-size:3rem;margin-bottom:50px;text-align:center}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));gap:30px}
.pcard{background:var(--card);border-radius:24px;padding:30px;border:1px solid var(--border);transition:0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);position:relative;overflow:hidden}
.pcard:hover{transform:translateY(-10px);border-color:var(--gold);box-shadow:0 20px 40px rgba(0,0,0,0.4)}
.pcard-emoji{font-size:4rem;margin-bottom:20px;display:block}
.pcard h3{font-family:'Fredoka One',cursive;font-size:1.5rem;margin-bottom:10px;color:var(--gold)}
.pcard p{color:var(--t);font-size:0.9rem;margin-bottom:20px}
.pbadge{display:inline-block;padding:4px 12px;background:var(--gold);color:#000;border-radius:50px;font-size:0.7rem;font-weight:800;margin-bottom:10px}
.price-box{display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid var(--border);padding-top:20px}
.price-tag{font-size:1.2rem;font-weight:800;color:var(--w)}

/* Map Tracker Section */
.map-container{display:grid;grid-template-columns:1.5fr 1fr;gap:40px;background:var(--card);padding:40px;border-radius:30px;border:1px solid var(--border)}
#tzsvg{width:100%;height:auto;max-height:600px}
#tzsvg path{fill:#1a1a1a;stroke:#333;stroke-width:0.5;transition:0.3s;cursor:pointer}
#tzsvg path.active{fill:var(--gold);filter:drop-shadow(0 0 10px var(--gold))}
.stats-panel{display:flex;flex-direction:column;gap:20px}
.stat-card{background:rgba(255,255,255,0.03);padding:20px;border-radius:15px;border:1px solid var(--border)}
.stat-val{font-size:2.5rem;font-family:'Fredoka One';color:var(--gold)}

@media (max-width:900px){
    .hero h1{font-size:5rem}
    .map-container{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav>
    <a href="#" class="logo">TWIGAZ</a>
    <ul class="nav-links">
        <li><a href="#collection">Collection</a></li>
        <li><a href="#outlets">Outlets</a></li>
        <li><a href="https://wa.me/255655443912">WhatsApp</a></li>
    </ul>
</nav>

<section class="hero">
    <h1>AISEE<br>TAMU SANA!</h1>
    <p>Premium Wheat & Rice Crisps from Tanzania</p>
</section>

<section class="sec" id="collection">
    <h2 class="sec-title">THE FLAVORS</h2>
    <div class="pgrid" id="pgrid"></div>
</section>

<section class="sec" id="outlets">
    <div class="map-container">
        <div class="map-view">
            <h3 style="font-family:'Fredoka One'; margin-bottom:20px">National Distribution</h3>
            <svg id="tzsvg" viewBox="0 0 430 540"></svg>
        </div>
        <div class="stats-panel">
            <div class="stat-card">
                <p style="text-transform:uppercase; font-size:0.7rem; letter-spacing:2px">Total Active Outlets</p>
                <div class="stat-val" id="total-val">0</div>
            </div>
            <div id="region-list" style="overflow-y:auto; max-height:400px; padding-right:10px">
                </div>
        </div>
    </div>
</section>

<script>
// Catalog Data from December 2025 PDF
const products = [
    { name: "Bongo Flava", emoji: "🔥", desc: "Bold, tangy, and slightly spicy Tanzanian seasoning. Street food vibes in every bite.", size: "45g / 20g", price: "1,000/-" },
    { name: "Tomato Ketchup", emoji: "🍅", desc: "Sweet, tangy, and packed with classic tomato goodness. A rich, juicy flavor twist.", size: "45g / 20g", price: "1,000/-" },
    { name: "Chicken Sekela", emoji: "🍗", desc: "Smoky, savoury flame-grilled chicken flavour. Perfectly seasoned and extra crunchy.", size: "45g / 20g", price: "1,000/-" },
    { name: "Spice Blast", emoji: "💥", desc: "An explosion of bold spice and satisfying multi-grain crunch for heat lovers.", size: "45g / 20g", price: "1,000/-" },
    { name: "Bongo Red (10g)", emoji: "🌶️", desc: "Big flavor in a mini pack! Comes with a FREE GIFT inside for extra joy.", size: "Mini Pack", price: "200/-", promo: "FREE GIFT" },
    { name: "Bongo Blue (10g)", emoji: "❄️", desc: "Cool twist on the classic—zesty and mildly spicy. Includes a FREE GIFT.", size: "Mini Pack", price: "200/-", promo: "FREE GIFT" }
];

function renderProducts() {
    document.getElementById('pgrid').innerHTML = products.map(p => `
        <div class="pcard">
            ${p.promo ? `<span class="pbadge">${p.promo}</span>` : ''}
            <span class="pcard-emoji">${p.emoji}</span>
            <h3>${p.name}</h3>
            <p>${p.desc}</p>
            <div class="price-box">
                <span style="font-size:0.7rem; color:var(--t)">SIZE: ${p.size}</span>
                <span class="price-tag">${p.price}</span>
            </div>
        </div>
    `).join('');
}

// Map Logic from tanzania_zone_painter.html
const REGIONS = ["Arusha", "Dar es Salaam", "Dodoma", "Geita", "Iringa", "Kagera", "Katavi", "Kigoma", "Kilimanjaro", "Lindi", "Manyara", "Mara", "Mbeya", "Morogoro", "Mtwara", "Mwanza", "Njombe", "Pwani", "Rukwa", "Ruvuma", "Shinyanga", "Simiyu", "Singida", "Songwe", "Tabora", "Tanga"];

function initMap() {
    const list = document.getElementById('region-list');
    list.innerHTML = REGIONS.sort().map(r => `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; padding:10px; background:rgba(255,255,255,0.02); border-radius:10px">
            <span style="font-size:0.8rem">${r}</span>
            <input type="number" value="${localStorage.getItem('outlets_'+r)||0}" 
                style="width:60px; background:#000; border:1px solid #333; color:var(--gold); text-align:center; border-radius:5px"
                onchange="updateStat('${r}', this.value)">
        </div>
    `).join('');
    updateTotal();
}

function updateStat(r, v) {
    localStorage.setItem('outlets_'+r, v);
    updateTotal();
}

function updateTotal() {
    let total = 0;
    REGIONS.forEach(r => total += parseInt(localStorage.getItem('outlets_'+r) || 0));
    document.getElementById('total-val').innerText = total.toLocaleString();
}

window.onload = () => { renderProducts(); initMap(); };
</script>
</body>
</html>
